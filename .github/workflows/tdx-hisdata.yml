name: TDX Auto Sync

on:
  schedule:
    # 每 15 分钟运行一次 (*/15)
    # 注意：为了覆盖北京时间 15:30-17:00，对应的 UTC 时间是 07:30-09:00
    - cron: '*/15 7,8,9 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  update_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Script
        run: python fetch_tdx.py

      - name: Deploy to Release
        # 只有当脚本下载了新文件时，才更新 Release
        if: hashFiles('tdx_data.zip') != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: tdx_data.zip
          name: "Daily Update"
          body: "Last checked: ${{ github.event.head_commit.timestamp }}"
          overwrite: true # 覆盖旧文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
